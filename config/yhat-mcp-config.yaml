server:
  name: yhat-mcp-server
  transport: stdio
database:
  host: ${YHAT_DB_HOST}
  port: 8444
  name: ${YHAT_DB_NAME}
  user: ${YHAT_DB_USER}
  passwordEnv: YHAT_DB_PASSWORD
  encrypt: true
  trustServerCertificate: false
whitelist:
  - schema: SDK
    tables:
      - ApiObject
      - Clientes
      - DriveItem
      - MailMessage
    mode: read_only
  - schema: dbo
    tables:
      - FA
      - FACodes
      - FACodesBranchRep
      - FACodesBranchRepVariant
      - FACodesFact
      - Agentes
      - Codes
      - Countries
      - Regions
      - Offices
      - Origins
      - IBD
      - FAxCodes
      - CodeOrigins
      - FACodes_Backup
      - FACodes_SyncAudit
      - stg_FACodes
      - stg_FAid
      - stg_FAid_BranchRep
      - vw_FACodes_Compat
      - vw_FACodes_Normalized
    mode: read_only
  - schema: sys
    tables:
      - tables
      - procedures
      - columns
    mode: read_only
limits:
  maxRows: 1000
  queryTimeoutSeconds: 30
  largeTableColumnThreshold: 25
  largeTableRowThreshold: 100000
audit:
  logDir: logs
  maxSizeMb: 50
  maxAgeDays: 30
  logLevel: info
