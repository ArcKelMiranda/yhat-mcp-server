schema: spec-driven

project:
  name: yhat-mcp-server
  display_name: Yhat MCP Server
  language: typescript
  runtime: node 20+
  framework: "@modelcontextprotocol/server v2"
  package_manager: npm
  architecture: mcp-server-stdio

context: |
  TypeScript/Node.js 20+ MCP server for secure, auditable SQL Server access.
  Uses @modelcontextprotocol/server v2 SDK, mssql (TDS), node-sql-parser, zod v4, js-yaml.
  Layered security pipeline: Query Guard, SQL Parser, Whitelist Auth, Row Limit, Audit Logger.
  CLI entrypoint: src/cli.ts, bundled with tsup to dist/cli.cjs.

strict_tdd: true

rules:
  proposal:
    - Align with PRD v1.1 scope and non-objectives
    - Prefer incremental, read-only-safe changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document security decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    follow_existing_patterns: true
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  runner: node
  framework: node --test
  command: "node --import tsx --test tests"
  coverage_tool: none
  coverage_threshold: 0
  strict_tdd: true
  available: true
  notes: "Test runner is configured but tests/ directory is empty (only .gitkeep). Add test files before enforcing coverage or CI gates."
